<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIFORMES Vegas</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:radial-gradient(circle at top,#1c1c1c,#000);
color:#e5e5e5;
}

/* ===== HEADER ===== */

header{
text-align:center;
padding:20px;
background:#111;
box-shadow:0 4px 15px black;
}

.logo{
width:180px;
margin-bottom:10px;
}

/* ===== FILTROS ===== */

.filtros{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:15px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #444;
background:#000;
color:white;
}

/* ===== CONTADORES ===== */

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:10px;
}

.stat{
background:#121212;
border:1px solid #2a2a2a;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

/* ===== CARDS ===== */

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

.card{
background:#121212;
border:1px solid #2a2a2a;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,.6);
}

.nome{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.status{
padding:6px 12px;
border-radius:8px;
font-weight:bold;
}

.pendente{background:#444;}
.separado{background:#777;}
.entregue{background:#bbb;color:black;}

.assinatura{
margin-top:10px;
background:white;
border-radius:10px;
max-width:260px;
}

select.statusSelect{
margin-top:10px;
width:220px;
}
input[type="date"]{
color:#e5e5e5;
background:#000;
appearance:none;
-webkit-appearance:none;
position:relative;
}
.linhaData{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

/* ícone calendário branco */
input[type="date"]::-webkit-calendar-picker-indicator{
filter:invert(1);
cursor:pointer;
}
.dataPedido{
color:#9ca3af;
font-size:14px;
margin-bottom:8px;
}

</style>
</head>

<body>

<header>
<img src="assets/vegaslogo.jpg" class="logo">
<h2>UNIFORMES VEGAS VIGILANCIA</h2>
</header>

<!-- FILTROS -->
<div class="filtros">

<input type="text" id="buscaCPF" placeholder="Buscar CPF">

<div class="linhaData">
<h3>DATA</h3>
<input type="date" id="buscaData">
</div>

<select id="filtroStatus">
<option value="">Todos Status</option>
<option value="PENDENTE">PENDENTE</option>
<option value="SEPARADO">SEPARADO</option>
<option value="ENTREGUE">ENTREGUE</option>
</select>

</div>

<!-- CONTADORES -->
<div class="stats">
<div class="stat" id="total">Total: 0</div>
<div class="stat" id="pendentes">Pendentes: 0</div>
<div class="stat" id="separados">Separados: 0</div>
<div class="stat" id="entregues">Entregues: 0</div>
</div>

<div class="container" id="lista"></div>

<script>

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbzmIzhrbJtXHodZK8JBipv_BCVnTwA2cBA0MVDgZwH_qrWKJ0vIQTAIEwmmyGCsapyqYg/exec";

let dadosGlobais=[];

/* ===== CARREGAR ===== */

async function carregar(){

const res=await fetch(URL_SCRIPT);
dadosGlobais=await res.json();

renderizar();
}
function formatarData(dataBruta){

if(!dataBruta) return "";

try{

// quando vem como texto do Sheets
const data = new Date(dataBruta);

return data.toLocaleString("pt-BR",{
day:"2-digit",
month:"2-digit",
year:"numeric",
hour:"2-digit",
minute:"2-digit"
});

}catch{
return dataBruta;
}

}
/* ===== RENDER ===== */

function renderizar(){

const cpfBusca=document.getElementById("buscaCPF").value;
const dataBusca=document.getElementById("buscaData").value;
const statusFiltro=document.getElementById("filtroStatus").value;

const container=document.getElementById("lista");
container.innerHTML="";

let total=0,pend=0,sep=0,ent=0;

dadosGlobais.reverse().forEach(item=>{

if(cpfBusca && !item.cpf.includes(cpfBusca)) return;

if(statusFiltro && item.status!==statusFiltro) return;

if(dataBusca && !item.data.includes(dataBusca.split("-").reverse().join("/"))) return;

total++;

if(item.status==="PENDENTE") pend++;
if(item.status==="SEPARADO") sep++;
if(item.status==="ENTREGUE") ent++;

container.innerHTML+=`

<div class="card">

<div class="nome">${item.nome}</div>
<p><b>Data do Pedido:</b> ${formatarData(item.data)}</p>
<p><b>CPF:</b> ${item.cpf}</p>
<p><b>Telefone:</b> ${item.telefone}</p>
<p><b>Posto:</b> ${item.posto}</p>

<p><b>Uniformes:</b><br>${item.uniformes}</p>

<p><b>Obs:</b> ${item.observacao || "Nenhuma"}</p>

${item.assinatura ? `
<p><b>Assinatura:</b></p>
<img src="${item.assinatura}" class="assinatura">
` : ""}

<p>
<b>Status:</b>
<span class="status ${item.status.toLowerCase()}">
${item.status}
</span>
</p>

<select class="statusSelect"
onchange="alterar(${item.id},this.value)">
<option value="">Alterar Status</option>
<option>PENDENTE</option>
<option>SEPARADO</option>
<option>ENTREGUE</option>
</select>

</div>
`;
});

/* CONTADORES */
document.getElementById("total").innerText="Total: "+total;
document.getElementById("pendentes").innerText="Pendentes: "+pend;
document.getElementById("separados").innerText="Separados: "+sep;
document.getElementById("entregues").innerText="Entregues: "+ent;

}

/* ===== ALTERAR STATUS ===== */

async function alterar(id,status){

if(!status) return;

await fetch(`${URL_SCRIPT}?func=atualizarStatus&id=${id}&status=${status}`);

carregar();
}

/* ===== EVENTOS FILTRO ===== */

document.getElementById("buscaCPF").oninput=renderizar;
document.getElementById("buscaData").onchange=renderizar;
document.getElementById("filtroStatus").onchange=renderizar;

/* AUTO REFRESH */
setInterval(carregar,15000);

carregar();

</script>

</body>
</html>
