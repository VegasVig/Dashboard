<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estoque Uniformes Vegas</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:radial-gradient(circle at top,#1c1c1c,#000);
color:#e5e5e5;
}

header{
text-align:center;
padding:20px;
background:#111;
box-shadow:0 4px 15px black;
}

.logo{
width:180px;
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

/* FILTROS */
.filtros{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin:15px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #444;
background:#000;
color:white;
}

/* CONTADORES */

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:15px;
}

.stat{
background:#121212;
border:1px solid #2a2a2a;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}

/* CARD */

.card{
background:#121212;
border:1px solid #2a2a2a;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,.6);
}

.nome{
font-size:18px;
font-weight:bold;
}

.status{
padding:6px 12px;
border-radius:8px;
font-weight:bold;
}

.pendente{background:#444;}
.separado{background:#777;}
.entregue{background:#bbb;color:black;}

.assinatura{
background:white;
border-radius:10px;
margin-top:10px;
max-width:260px;
}

</style>
</head>

<body>

<header>
<img src="assets/vegaslogo.jpg" class="logo">
<h2>Dashboard do Estoque</h2>
</header>

<div class="filtros">
<input id="buscaCPF" placeholder="Buscar CPF">
<select id="filtroStatus">
<option value="">Todos Status</option>
<option>PENDENTE</option>
<option>SEPARADO</option>
<option>ENTREGUE</option>
</select>
</div>

<div class="stats">
<div class="stat" id="total">Total: 0</div>
<div class="stat" id="pendentes">Pendentes: 0</div>
<div class="stat" id="separados">Separados: 0</div>
<div class="stat" id="entregues">Entregues: 0</div>
</div>

<div class="container" id="lista"></div>

<script>

/* ⚠️ COLE SUA URL DO WEB APP */
const URL_SCRIPT="https://script.google.com/macros/s/AKfycbwIPsU0ef84l2J-G3WPaASZ7fhAyj72dg7dN08tQYGn7YP7t2YcU39jbzGWoedwQYgMTw";

let dadosGlobais=[];

/* ===== BUSCAR GOOGLE SHEETS ===== */

async function carregar(){

try{

const res = await fetch(URL_SCRIPT);
dadosGlobais = await res.json();

/* ORDEM MAIS RECENTE PRIMEIRO */
dadosGlobais.sort((a,b)=> b.id - a.id);

renderizar();

}catch(e){
console.log("Erro ao buscar dados:",e);
}

}

/* ===== RENDER ===== */

function renderizar(){

const cpfBusca=document.getElementById("buscaCPF").value;
const statusFiltro=document.getElementById("filtroStatus").value;

const container=document.getElementById("lista");
container.innerHTML="";

let total=0,pend=0,sep=0,ent=0;

dadosGlobais.forEach(item=>{

if(cpfBusca && !item.cpf.includes(cpfBusca)) return;
if(statusFiltro && item.status!==statusFiltro) return;

total++;

if(item.status==="PENDENTE") pend++;
if(item.status==="SEPARADO") sep++;
if(item.status==="ENTREGUE") ent++;

container.innerHTML+=`

<div class="card">

<div class="nome">${item.nome}</div>

<p><b>CPF:</b> ${item.cpf}</p>
<p><b>Telefone:</b> ${item.telefone}</p>
<p><b>Posto:</b> ${item.posto}</p>

<p><b>Uniformes:</b><br>${item.uniformes}</p>

<p><b>Obs:</b> ${item.observacao || "Nenhuma"}</p>

${item.assinatura ? `
<p><b>Assinatura:</b></p>
<img src="${item.assinatura}" class="assinatura">
`:""}

<p>
<b>Status:</b>
<span class="status ${item.status.toLowerCase()}">
${item.status}
</span>
</p>

<select onchange="alterar(${item.id},this.value)">
<option value="">Alterar Status</option>
<option>PENDENTE</option>
<option>SEPARADO</option>
<option>ENTREGUE</option>
</select>

</div>
`;

});

/* CONTADORES */
document.getElementById("total").innerText="Total: "+total;
document.getElementById("pendentes").innerText="Pendentes: "+pend;
document.getElementById("separados").innerText="Separados: "+sep;
document.getElementById("entregues").innerText="Entregues: "+ent;

}

/* ===== ALTERAR STATUS ===== */

async function alterar(id,status){

if(!status) return;

await fetch(`${URL_SCRIPT}?func=atualizarStatus&id=${id}&status=${status}`);

carregar();
}

/* FILTROS */
buscaCPF.oninput=renderizar;
filtroStatus.onchange=renderizar;

/* AUTO UPDATE */
setInterval(carregar,15000);

carregar();

</script>

</body>
</html>
