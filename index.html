<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFORMES Vegas</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: radial-gradient(circle at top, #1c1c1c, #000);
            color: #e5e5e5;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #111;
            box-shadow: 0 4px 15px black;
        }

        .logo {
            width: 180px;
            margin-bottom: 10px;
        }

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
        }

        input,
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
            min-width: 180px;
            width: 280px;
            box-sizing: border-box;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .stat {
            background: #121212;
            border: 1px solid #2a2a2a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 15px;
        }

        .card {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .6);
        }

        .nome {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: white;
        }

        .status {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .em-análise {
            background: #f97316;
            color: white;
        }

        .pendente {
            background: #facc15;
            color: black;
        }

        .separado {
            background: #3b82f6;
            color: white;
        }

        .entregue {
            background: #22c55e;
            color: black;
        }

        .assinatura {
            margin-top: 10px;
            background: white;
            border-radius: 10px;
            max-width: 260px;
        }

        .fotoAvaria {
            width: 120px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .fotosBox {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .statusSelect {
            margin-top: 15px;
            width: 100%;
        }

        .tipoToggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tipoToggle button {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #111;
            color: white;
            cursor: pointer;
        }

        .tipoToggle .ativo {
            background: #c0c0c0;
            color: black;
            font-weight: bold;
        }

        #loadingMsg {
            text-align: center;
            padding: 20px;
        }

        .graficoBox {
            max-width: 450px;
            margin: 20px auto;
            background: #121212;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }
    </style>
</head>

<body>

    <header>
        <img src="assets/vegaslogo.jpg" class="logo">
        <h2>UNIFORMES E MATERIAIS VEGAS VIGILÂNCIA</h2>
    </header>

    <div class="tipoToggle">
        <button id="btnUniformes"
            class="ativo"
            onclick="trocarTipo('uniformes')">
            Uniformes
        </button>

        <button id="btnMateriais"
            onclick="trocarTipo('materiais')">
            Materiais
        </button>
    </div>

    <div class="filtros">

        <input type="text"
            id="buscaNome"
            placeholder="Buscar Nome">

        <input type="text"
            id="buscaCPF"
            placeholder="Buscar CPF">

        <input type="text"
            id="buscaProtocolo"
            placeholder="Buscar Protocolo">

        <select id="filtroStatus">

            <option value="">
                Todos Status
            </option>

            <option value="EM ANÁLISE">
                EM ANÁLISE
            </option>

            <option value="PENDENTE">
                PENDENTE
            </option>

            <option value="SEPARADO">
                SEPARADO
            </option>

            <option value="ENTREGUE">
                ENTREGUE
            </option>

        </select>

    </div>

    <div class="stats">

        <div class="stat" id="total">
            Total: 0
        </div>

        <div class="stat"
            id="analise"
            style="color:#f97316">
            Em análise: 0
        </div>

        <div class="stat"
            id="pendentes"
            style="color:#facc15">
            Pendentes: 0
        </div>

        <div class="stat"
            id="separados"
            style="color:#3b82f6">
            Separados: 0
        </div>

        <div class="stat"
            id="entregues"
            style="color:#22c55e">
            Entregues: 0
        </div>

    </div>

    <div class="graficoBox">
        <canvas id="graficoStatus"></canvas>
    </div>

    <div id="loadingMsg">
        Carregando dados...
    </div>

    <div class="container" id="lista"></div>

    <script>

        let dadosGlobais = [];
        let tipoAtual = "uniformes";
        let grafico;

        const URL_SCRIPT =
            "https://script.google.com/macros/s/AKfycbxeFZGXM28fUn8_2wA_hAAQ9v_N62Rm-RksUlGFbs4ofpYlwKOuA_d_J2awDDDnTZ6f0Q/exec";

        function trocarTipo(tipo) {

            tipoAtual = tipo;

            document.getElementById("btnUniformes")
                .classList.remove("ativo");

            document.getElementById("btnMateriais")
                .classList.remove("ativo");

            if (tipo === "uniformes") {

                document.getElementById("btnUniformes")
                    .classList.add("ativo");

            } else {

                document.getElementById("btnMateriais")
                    .classList.add("ativo");
            }

            carregar();
        }

        async function carregar() {

            document.getElementById("loadingMsg")
                .style.display = "block";

            try {

                const res = await fetch(
                    `${URL_SCRIPT}?tipo=${tipoAtual}`
                );

                dadosGlobais = await res.json();

                dadosGlobais = dadosGlobais.map(item => {

                    let fotosTemp =
                        item.fotos || item.foto || "";

                    if (typeof fotosTemp === "string") {

                        try {

                            fotosTemp =
                                JSON.parse(fotosTemp);

                        } catch {

                            fotosTemp = fotosTemp
                                .split(" | ")
                                .filter(f => f.trim() !== "");
                        }
                    }

                    item.fotos =
                        Array.isArray(fotosTemp)
                            ? fotosTemp
                            : [];

                    return item;
                });

                document.getElementById("loadingMsg")
                    .style.display = "none";

                renderizar();

            } catch (e) {

                console.error(e);

                document.getElementById("loadingMsg")
                    .innerText =
                    "Erro ao carregar dados";
            }
        }

        function formatarData(dataBruta) {

            if (!dataBruta) return "";

            try {

                const data = new Date(dataBruta);

                return data.toLocaleString("pt-BR", {

                    day: "2-digit",
                    month: "2-digit",
                    year: "numeric",
                    hour: "2-digit",
                    minute: "2-digit"

                });

            } catch {

                return dataBruta;
            }
        }

        function renderizar() {

            const nomeBusca =
                document.getElementById("buscaNome")
                    .value.toLowerCase();

            const cpfBusca =
                document.getElementById("buscaCPF")
                    .value.replace(/\D/g, "");

            const protocoloBusca =
                document.getElementById("buscaProtocolo")
                    .value.toLowerCase();

            const statusFiltro =
                document.getElementById("filtroStatus")
                    .value;

            const container =
                document.getElementById("lista");

            container.innerHTML = "";

            let total = 0;
            let analise = 0;
            let pend = 0;
            let sep = 0;
            let ent = 0;

            dadosGlobais
                .slice()
                .reverse()
                .forEach(item => {

                    const cpfItem =
                        item.cpf
                            ? String(item.cpf)
                                .replace(/\D/g, "")
                            : "";

                    if (
                        nomeBusca &&
                        (!item.nome ||
                            !item.nome.toLowerCase()
                                .includes(nomeBusca))
                    ) return;

                    if (
                        tipoAtual === "uniformes" &&
                        cpfBusca &&
                        !cpfItem.includes(cpfBusca)
                    ) return;

                    if (
                        protocoloBusca &&
                        (!item.protocolo ||
                            !String(item.protocolo)
                                .toLowerCase()
                                .includes(protocoloBusca))
                    ) return;

                    if (
                        statusFiltro &&
                        item.status !== statusFiltro
                    ) return;

                    total++;

                    if (item.status === "EM ANÁLISE")
                        analise++;

                    if (item.status === "PENDENTE")
                        pend++;

                    if (item.status === "SEPARADO")
                        sep++;

                    if (item.status === "ENTREGUE")
                        ent++;

                    const statusClass =
                        item.status
                            .toLowerCase()
                            .replace(" ", "-");

                    if (tipoAtual === "materiais") {

                        container.innerHTML += `

                        <div class="card">

                            <div class="nome">
                                ${item.nome || ""}
                            </div>

                            <p>
                                <b>Protocolo:</b>
                                ${item.protocolo || ""}
                            </p>

                            <p>
                                <b>Data:</b>
                                ${formatarData(item.data)}
                            </p>

                            <p>
                                <b>Cidade:</b>
                                ${item.cidade || ""}
                            </p>

                            <p>
                                <b>Posto:</b>
                                ${item.posto || ""}
                            </p>

                            <p>
                                <b>Material:</b>
                                ${item.material || ""}
                            </p>

                            <p>
                                <b>Quantidade:</b>
                                ${item.quantidade || ""}
                            </p>

                            <p>
                                <b>Obs:</b>
                                ${item.obs || "Nenhuma"}
                            </p>

                            ${
                                item.assinatura
                                ? `
                                <img src="${item.assinatura}"
                                class="assinatura">
                                `
                                : ""
                            }

                            ${
                                item.fotos.length > 0
                                ? `
                                <div style="margin-top:15px;">

                                    <b>Fotos:</b>

                                    <div class="fotosBox">

                                        ${item.fotos.map(f => `
                                            <img src="${f}"
                                            class="fotoAvaria">
                                        `).join("")}

                                    </div>

                                </div>
                                `
                                : ""
                            }

                            <p style="margin-top:15px;">

                                <b>Status:</b>

                                <span class="status ${statusClass}">
                                    ${item.status}
                                </span>

                            </p>

                            <select class="statusSelect"
                                onchange="alterar(${item.id}, this.value)">

                                <option value="">
                                    Alterar Status
                                </option>

                                <option>EM ANÁLISE</option>
                                <option>PENDENTE</option>
                                <option>SEPARADO</option>
                                <option>ENTREGUE</option>

                            </select>

                        </div>
                        `;

                    } else {

                        container.innerHTML += `

                        <div class="card">

                            <div class="nome">
                                ${item.nome || ""}
                            </div>

                            <p>
                                <b>Protocolo:</b>
                                ${item.protocolo || ""}
                            </p>

                            <p>
                                <b>Data:</b>
                                ${formatarData(item.data)}
                            </p>

                            <p>
                                <b>CPF:</b>
                                ${item.cpf || ""}
                            </p>

                            <p>
                                <b>Telefone:</b>
                                ${item.telefone || ""}
                            </p>

                            <p>
                                <b>Posto:</b>
                                ${item.posto || ""}
                            </p>

                            <p>
                                <b>Uniformes:</b><br>
                                ${item.uniformes || ""}
                            </p>

                            <p>
                                <b>Obs:</b>
                                ${item.observacao || "Nenhuma"}
                            </p>

                            ${
                                item.assinatura
                                ? `
                                <img src="${item.assinatura}"
                                class="assinatura">
                                `
                                : ""
                            }

                            ${
                                item.fotos.length > 0
                                ? `
                                <div style="margin-top:15px;">

                                    <b>Fotos:</b>

                                    <div class="fotosBox">

                                        ${item.fotos.map(f => `
                                            <img src="${f}"
                                            class="fotoAvaria">
                                        `).join("")}

                                    </div>

                                </div>
                                `
                                : ""
                            }

                            <p style="margin-top:15px;">

                                <b>Status:</b>

                                <span class="status ${statusClass}">
                                    ${item.status}
                                </span>

                            </p>

                            <select class="statusSelect"
                                onchange="alterar(${item.id}, this.value)">

                                <option value="">
                                    Alterar Status
                                </option>

                                <option>EM ANÁLISE</option>
                                <option>PENDENTE</option>
                                <option>SEPARADO</option>
                                <option>ENTREGUE</option>

                            </select>

                        </div>
                        `;
                    }
                });

            document.getElementById("total")
                .innerText = "Total: " + total;

            document.getElementById("analise")
                .innerText = "Em análise: " + analise;

            document.getElementById("pendentes")
                .innerText = "Pendentes: " + pend;

            document.getElementById("separados")
                .innerText = "Separados: " + sep;

            document.getElementById("entregues")
                .innerText = "Entregues: " + ent;

            atualizarGrafico(
                analise,
                pend,
                sep,
                ent
            );
        }

        function atualizarGrafico(
            analise,
            pend,
            sep,
            ent
        ) {

            const ctx =
                document.getElementById("graficoStatus");

            if (grafico)
                grafico.destroy();

            grafico = new Chart(ctx, {

                type: "pie",

                data: {

                    labels: [
                        "Em análise",
                        "Pendentes",
                        "Separados",
                        "Entregues"
                    ],

                    datasets: [{

                        data: [
                            analise,
                            pend,
                            sep,
                            ent
                        ],

                        backgroundColor: [
                            "#f97316",
                            "#facc15",
                            "#3b82f6",
                            "#22c55e"
                        ]
                    }]
                }
            });
        }

        async function alterar(id, status) {

            if (!status) return;

            await fetch(
                `${URL_SCRIPT}?func=atualizarStatus&id=${id}&status=${status}&tipo=${tipoAtual}`
            );

            carregar();
        }

        document.getElementById("buscaNome")
            .oninput = renderizar;

        document.getElementById("buscaCPF")
            .oninput = renderizar;

        document.getElementById("buscaProtocolo")
            .oninput = renderizar;

        document.getElementById("filtroStatus")
            .onchange = renderizar;

        setInterval(carregar, 30000);

        carregar();

    </script>

</body>

</html>
