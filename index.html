<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFORMESVegas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial; background: radial-gradient(circle at top, #1c1c1c, #000); color: #e5e5e5; }
        header { text-align: center; padding: 20px; background: #111; box-shadow: 0 4px 15px black; }
        .logo { width: 180px; margin-bottom: 10px; }
        .filtros { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 15px; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; min-width: 180px; }
        button { cursor: pointer; transition: .2s; }
        button:hover { background: #1a1a1a; }
        .stats { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .stat { background: #121212; border: 1px solid #2a2a2a; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        .graficoBox { max-width: 500px; margin: 20px auto; background: #121212; padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a; }
        .container { max-width: 1100px; margin: auto; padding: 15px; }
        .card { background: #121212; border: 1px solid #2a2a2a; border-radius: 14px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,.6); }
        .nome { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #fff; }

        /* Badge status */
        .badge { display: inline-block; padding: 5px 13px; border-radius: 8px; font-weight: bold; font-size: 13px; }
        .badge-em-analise { background: #f97316; color: #fff; }
        .badge-pendente   { background: #facc15; color: #000; }
        .badge-separado   { background: #3b82f6; color: #fff; }
        .badge-entregue   { background: #22c55e; color: #000; }

        /* Dropdown status */
        .statusWrap { position: relative; display: inline-block; margin-top: 12px; }
        .statusWrap .badge { cursor: pointer; user-select: none; padding-right: 26px; }
        .statusWrap .badge::after { content: " ▾"; font-size: 11px; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); }
        .statusMenu { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: #1e1e1e; border: 1px solid #444; border-radius: 10px; overflow: hidden; z-index: 100; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.7); }
        .statusMenu.aberto { display: block; }
        .statusMenu button { display: block; width: 100%; text-align: left; padding: 10px 16px; border: none; background: transparent; color: #e5e5e5; font-size: 13px; font-weight: bold; min-width: unset; border-radius: 0; cursor: pointer; transition: background .15s; }
        .statusMenu button:hover { background: #2a2a2a; }
        .statusMenu button.opt-em-analise { color: #f97316; }
        .statusMenu button.opt-pendente   { color: #facc15; }
        .statusMenu button.opt-separado   { color: #3b82f6; }
        .statusMenu button.opt-entregue   { color: #22c55e; }
        .statusMenu button.atual { background: #2a2a2a; opacity: .5; pointer-events: none; }

        /* Fotos */
        .fotosBox { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .fotoAvaria { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; border: 1px solid #333; cursor: pointer; transition: transform .2s; }
        .fotoAvaria:hover { transform: scale(1.06); }
        .assinatura { display: block; margin-top: 10px; background: white; border-radius: 10px; max-width: 240px; }

        /* Tipo toggle */
        .tipoToggle { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .tipoToggle .ativo { background: #c0c0c0; color: black; font-weight: bold; }

        #loadingMsg { text-align: center; padding: 20px; }

        /* Ranking */
        .rankingBox { max-width: 500px; margin: 0 auto 10px; text-align: center; }
        .rankingToggleBtn { background: #1e1e1e; border: 1px solid #3a3a3a; color: #e5e5e5; padding: 10px 24px; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; min-width: unset; transition: background .2s; }
        .rankingToggleBtn:hover { background: #2a2a2a; }
        .rankingLista { display: none; margin-top: 10px; background: #121212; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; text-align: left; }
        .rankingLista.aberta { display: block; }
        .rankingItem { background: #1b1b1b; padding: 10px; border-radius: 10px; margin-top: 8px; border: 1px solid #2a2a2a; }

        /* Modal */
        #modalFoto { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 9999; justify-content: center; align-items: center; }
        #modalFoto.aberto { display: flex; }
        #modalFoto img { max-width: 92vw; max-height: 92vh; border-radius: 12px; }
        #modalFoto .fechar { position: fixed; top: 16px; right: 24px; font-size: 40px; cursor: pointer; color: #fff; user-select: none; }

        /* Toast */
        #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 11px 24px; border-radius: 10px; font-weight: bold; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; white-space: nowrap; }
        #toast.visivel { opacity: 1; }
    </style>
</head>
<body>

<div id="modalFoto" onclick="fecharModal()">
    <span class="fechar">&#x2715;</span>
    <img id="modalImg" src="" onclick="event.stopPropagation()">
</div>
<div id="toast"></div>

<header>
    <img src="assets/vegaslogo.jpg" class="logo">
    <h2>UNIFORMES E MATERIAIS VEGAS VIGILÂNCIA</h2>
</header>

<div class="tipoToggle">
    <button id="btnUniformes" class="ativo" onclick="trocarTipo('uniformes')">Uniformes</button>
    <button id="btnMateriais" onclick="trocarTipo('materiais')">Materiais</button>
</div>

<div class="filtros">
    <input type="text" id="buscaNome"      placeholder="Buscar Nome"      oninput="renderizar()">
    <input type="text" id="buscaCPF"       placeholder="Buscar CPF"       oninput="renderizar()">
    <input type="text" id="buscaProtocolo" placeholder="Buscar Protocolo" oninput="renderizar()">
    <select id="filtroStatus" onchange="renderizar()">
        <option value="">Todos Status</option>
        <option value="EM ANÁLISE">EM ANÁLISE</option>
        <option value="PENDENTE">PENDENTE</option>
        <option value="SEPARADO">SEPARADO</option>
        <option value="ENTREGUE">ENTREGUE</option>
    </select>
</div>

<div class="stats">
    <div class="stat" id="total">Total: 0</div>
    <div class="stat" id="stAnalise"   style="color:#f97316">Em análise: 0</div>
    <div class="stat" id="stPendentes" style="color:#facc15">Pendentes: 0</div>
    <div class="stat" id="stSeparados" style="color:#3b82f6">Separados: 0</div>
    <div class="stat" id="stEntregues" style="color:#22c55e">Entregues: 0</div>
</div>

<div class="tipoToggle">
    <button onclick="exportarPDF('EM ANÁLISE')">PDF EM ANÁLISE</button>
    <button onclick="exportarPDF('PENDENTE')">PDF PENDENTES</button>
    <button onclick="exportarPDF('SEPARADO')">PDF SEPARADOS</button>
    <button onclick="exportarPDF('ENTREGUE')">PDF ENTREGUES</button>
</div>

<div class="graficoBox">
    <canvas id="graficoStatus"></canvas>
</div>

<div class="rankingBox">
    <button class="rankingToggleBtn" id="btnRanking" onclick="toggleRanking()">&#x1F3C6; Ver Ranking de Solicitações</button>
    <div class="rankingLista" id="rankingLista"></div>
</div>

<div id="loadingMsg">Carregando dados...</div>
<div class="container" id="lista"></div>

<script>
let dadosGlobais = [];
let tipoAtual    = "uniformes";
let grafico;
let menuAberto   = null;
let rankingAberto = false;

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby09bSqj7qAKG4bEOc996--c4UllFA-yoPKvCK7pg2kMWYRr5OLLPbu4O-u-7s4Q_6H6Q/exec";

/* ── Fecha dropdown ao clicar fora ── */
document.addEventListener("click", () => {
    if (menuAberto) { menuAberto.classList.remove("aberto"); menuAberto = null; }
});

/* ── Modal ── */
function abrirModal(src) {
    document.getElementById("modalImg").src = src;
    document.getElementById("modalFoto").classList.add("aberto");
}
function fecharModal() {
    document.getElementById("modalFoto").classList.remove("aberto");
}

/* ── Toast ── */
let _tt;
function toast(msg, cor="#333") {
    clearTimeout(_tt);
    const t = document.getElementById("toast");
    t.textContent = msg; t.style.background = cor; t.classList.add("visivel");
    _tt = setTimeout(() => t.classList.remove("visivel"), 3000);
}

/* ── Tipo ── */
function trocarTipo(tipo) {
    tipoAtual = tipo;
    document.getElementById("btnUniformes").classList.toggle("ativo", tipo === "uniformes");
    document.getElementById("btnMateriais").classList.toggle("ativo", tipo === "materiais");
    carregar();
}

/* ── Carregar ── */
async function carregar() {
    document.getElementById("loadingMsg").style.display = "block";
    document.getElementById("lista").innerHTML = "";
    try {
        const res  = await fetch(`${URL_SCRIPT}?tipo=${tipoAtual}`);
        const json = await res.json();
        dadosGlobais = json.map(item => {
            // Normaliza fotos: pode vir como array ou string direta base64
            if (typeof item.fotos === "string") {
                if (item.fotos.startsWith("[")) {
                    try { item.fotos = JSON.parse(item.fotos); } catch { item.fotos = []; }
                } else if (item.fotos.startsWith("data:") || item.fotos.startsWith("http")) {
                    item.fotos = [item.fotos];
                } else {
                    item.fotos = [];
                }
            }
            if (!Array.isArray(item.fotos)) item.fotos = [];
            item.fotos = item.fotos.filter(f => typeof f === "string" && f.length > 10);
            return item;
        });
    } catch(err) {
        toast("Erro ao carregar!", "#ef4444");
        console.error(err);
    }
    document.getElementById("loadingMsg").style.display = "none";
    renderizar();
}

/* ── Renderizar ── */
function renderizar() {
    const busca     = document.getElementById("buscaNome").value.toLowerCase();
    const buscaCPF  = document.getElementById("buscaCPF").value.toLowerCase();
    const buscaProt = document.getElementById("buscaProtocolo").value.toLowerCase();
    const filtroSts = document.getElementById("filtroStatus").value;
    const lista     = document.getElementById("lista");
    lista.innerHTML = "";

    let total=0, analise=0, pend=0, sep=0, ent=0;

    dadosGlobais.slice().reverse().forEach(item => {
        if (busca     && !(item.nome      ||"").toLowerCase().includes(busca))     return;
        if (buscaCPF  && !(item.cpf       ||"").toLowerCase().includes(buscaCPF))  return;
        if (buscaProt && !(item.protocolo ||"").toLowerCase().includes(buscaProt)) return;
        if (filtroSts && item.status !== filtroSts) return;

        total++;
        if (item.status === "EM ANÁLISE") analise++;
        if (item.status === "PENDENTE")   pend++;
        if (item.status === "SEPARADO")   sep++;
        if (item.status === "ENTREGUE")   ent++;

        const div = document.createElement("div");
        div.className = "card";
        div.id = `card-${item.id}`;
        div.innerHTML = montarCard(item);
        lista.appendChild(div);
    });

    document.getElementById("total").innerText        = "Total: "      + total;
    document.getElementById("stAnalise").innerText    = "Em análise: " + analise;
    document.getElementById("stPendentes").innerText  = "Pendentes: "  + pend;
    document.getElementById("stSeparados").innerText  = "Separados: "  + sep;
    document.getElementById("stEntregues").innerText  = "Entregues: "  + ent;

    atualizarGrafico(analise, pend, sep, ent);
    atualizarRanking();
}

/* ── Montar card ── */
function montarCard(item) {
    const badgeClass = {
        "EM ANÁLISE": "badge-em-analise",
        "PENDENTE":   "badge-pendente",
        "SEPARADO":   "badge-separado",
        "ENTREGUE":   "badge-entregue"
    }[item.status] || "badge-em-analise";

    const opcoes = [
        ["EM ANÁLISE", "opt-em-analise"],
        ["PENDENTE",   "opt-pendente"],
        ["SEPARADO",   "opt-separado"],
        ["ENTREGUE",   "opt-entregue"]
    ].map(([s, cls]) =>
        `<button class="${cls}${item.status===s?" atual":""}"
                 onclick="alterarStatus(${item.id},'${s}',event)">
            ${s}${item.status===s?" ✓":""}
        </button>`
    ).join("");

    const dropdown = `<div class="statusWrap">
        <span class="badge ${badgeClass}" onclick="toggleMenu(${item.id},event)">${item.status}</span>
        <div class="statusMenu" id="menu-${item.id}">${opcoes}</div>
    </div>`;

    // Fotos — uniformes: array item.fotos | materiais: string item.foto
    let fotosHtml = "";
    if (tipoAtual === "materiais" && item.foto && item.foto.length > 10) {
        fotosHtml = `<div class="fotosBox">
            <img src="${item.foto}" class="fotoAvaria" onclick="abrirModal(this.src)">
        </div>`;
    } else if (tipoAtual === "uniformes" && item.fotos && item.fotos.length > 0) {
        fotosHtml = `<div class="fotosBox">
            ${item.fotos.map(f => `<img src="${f}" class="fotoAvaria" onclick="abrirModal(this.src)">`).join("")}
        </div>`;
    }

    const ass = item.assinatura && item.assinatura.length > 10
        ? `<img src="${item.assinatura}" class="assinatura">` : "";

    if (tipoAtual === "materiais") return `
        <div class="nome">${item.nome||""}</div>
        <p><b>Protocolo:</b>  ${item.protocolo ||""}</p>
        <p><b>Cidade:</b>     ${item.cidade    ||""}</p>
        <p><b>Posto:</b>      ${item.posto     ||""}</p>
        <p><b>Material:</b>   ${item.material  ||""}</p>
        <p><b>Quantidade:</b> ${item.quantidade||""}</p>
        <p><b>Obs:</b>        ${item.observacao||""}</p>
        ${ass}${fotosHtml}
        <p><b>Status:</b> ${dropdown}</p>`;

    return `
        <div class="nome">${item.nome||""}</div>
        <p><b>Protocolo:</b> ${item.protocolo ||""}</p>
        <p><b>CPF:</b>       ${item.cpf       ||""}</p>
        <p><b>Telefone:</b>  ${item.telefone  ||""}</p>
        <p><b>Posto:</b>     ${item.posto     ||""}</p>
        <p><b>Uniformes:</b><br>${item.uniformes||""}</p>
        <p><b>Obs:</b>       ${item.observacao||""}</p>
        ${ass}${fotosHtml}
        <p><b>Status:</b> ${dropdown}</p>`;
}

/* ── Toggle dropdown de status ── */
function toggleMenu(id, event) {
    event.stopPropagation();
    const menu = document.getElementById(`menu-${id}`);
    if (menuAberto && menuAberto !== menu) menuAberto.classList.remove("aberto");
    menu.classList.toggle("aberto");
    menuAberto = menu.classList.contains("aberto") ? menu : null;
}

/* ── Alterar status ── */
async function alterarStatus(id, novoStatus, event) {
    event.stopPropagation();
    const item = dadosGlobais.find(i => i.id === id);
    if (!item || item.status === novoStatus) return;
    if (menuAberto) { menuAberto.classList.remove("aberto"); menuAberto = null; }

    toast("Salvando...", "#555");
    item.status = novoStatus;
    const card = document.getElementById(`card-${id}`);
    if (card) card.innerHTML = montarCard(item);
    atualizarContadores();

    try {
        const url = `${URL_SCRIPT}?func=atualizarStatus&tipo=${tipoAtual}&id=${id}&status=${encodeURIComponent(novoStatus)}`;
        const res  = await fetch(url);
        const json = await res.json();
        if (json.sucesso) {
            toast("✓ " + novoStatus, "#22c55e");
        } else {
            throw new Error(json.erro || json.mensagem || "Erro desconhecido");
        }
    } catch(err) {
        toast("Erro: " + err.message, "#ef4444");
        carregar();
    }
}

/* ── Contadores ── */
function atualizarContadores() {
    const filtroSts = document.getElementById("filtroStatus").value;
    let total=0, analise=0, pend=0, sep=0, ent=0;
    dadosGlobais.forEach(item => {
        if (filtroSts && item.status !== filtroSts) return;
        total++;
        if (item.status === "EM ANÁLISE") analise++;
        if (item.status === "PENDENTE")   pend++;
        if (item.status === "SEPARADO")   sep++;
        if (item.status === "ENTREGUE")   ent++;
    });
    document.getElementById("total").innerText        = "Total: "      + total;
    document.getElementById("stAnalise").innerText    = "Em análise: " + analise;
    document.getElementById("stPendentes").innerText  = "Pendentes: "  + pend;
    document.getElementById("stSeparados").innerText  = "Separados: "  + sep;
    document.getElementById("stEntregues").innerText  = "Entregues: "  + ent;
    atualizarGrafico(analise, pend, sep, ent);
    atualizarRanking();
}

/* ── Gráfico ── */
function atualizarGrafico(a, p, s, e) {
    const ctx = document.getElementById("graficoStatus");
    if (grafico) grafico.destroy();
    grafico = new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Em análise","Pendentes","Separados","Entregues"],
            datasets: [{ data: [a,p,s,e], backgroundColor: ["#f97316","#facc15","#3b82f6","#22c55e"] }]
        }
    });
}

/* ── Ranking toggle ── */
function toggleRanking() {
    const listaEl = document.getElementById("rankingLista");
    const btn     = document.getElementById("btnRanking");
    rankingAberto = !rankingAberto;
    if (rankingAberto) {
        atualizarRanking();
        listaEl.classList.add("aberta");
        btn.innerHTML = "&#x1F3C6; Fechar Ranking";
    } else {
        listaEl.classList.remove("aberta");
        btn.innerHTML = "&#x1F3C6; Ver Ranking de Solicitações";
    }
}

function atualizarRanking() {
    const r = {};
    dadosGlobais.forEach(i => { if (i.nome) r[i.nome] = (r[i.nome]||0)+1; });
    const top = Object.entries(r).sort((a,b) => b[1]-a[1]).slice(0,10);
    document.getElementById("rankingLista").innerHTML =
        top.map((x,i) => `<div class="rankingItem">${i+1}. <b>${x[0]}</b><br>${x[1]} solicitações</div>`).join("")
        || "<p style='color:#888'>Nenhum dado.</p>";
}

/* ── PDF Definitivo — Sem Cidade / Sem Fotos / Com Data, Nome, Posto e Itens ── */
async function exportarPDF(statusFiltro) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(16);
    
    const tituloTipo = tipoAtual === "uniformes" ? "UNIFORMES" : "MATERIAIS";
    pdf.text(`RELATÓRIO DE ${tituloTipo} - STATUS: ${statusFiltro}`, 14, 20);
    
    // Data atual automatizada
    pdf.setFont("helvetica", "normal");
    pdf.setFontSize(10);
    const dataAtual = new Date().toLocaleDateString('pt-BR');
    pdf.text(`Emitido em: ${dataAtual}`, 14, 27);
    
    pdf.setDrawColor(200, 200, 200);
    pdf.line(14, 30, 196, 30);
    
    let y = 38;
    const limitePagina = 275;
    
    const itensFiltrados = dadosGlobais.filter(i => i.status === statusFiltro);
    
    if (itensFiltrados.length === 0) {
        pdf.setFontSize(12);
        pdf.text("Nenhum registro encontrado para este status.", 14, y);
        pdf.save(`relatorio_${tipoAtual}_${statusFiltro}.pdf`);
        return;
    }

    itensFiltrados.forEach((item, index) => {
        // Altura de segurança para cada bloco
        if (y + 30 > limitePagina) {
            pdf.addPage();
            y = 20;
        }
        
        // Nome do funcionário
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(12);
        pdf.text(`${index + 1}. ${item.nome || "Não informado"}`, 14, y);
        y += 6;
        
        // Detalhes (Data e Posto)
        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(10);
        const postoTxt = item.posto || "Não informado";
        pdf.text(`Data: ${dataAtual}   |   Posto: ${postoTxt}`, 14, y);
        y += 6;
        
        // Itens Solicitados
        if (tipoAtual === "uniformes") {
            pdf.setFont("helvetica", "bold");
            pdf.text("Uniformes Solicitados:", 14, y);
            pdf.setFont("helvetica", "normal");
            y += 5;
            
            const textoUniformes = item.uniformes || "Nenhum uniforme listado";
            const linhasUniformes = pdf.splitTextToSize(textoUniformes, 180);
            
            linhasUniformes.forEach(linha => {
                if (y > limitePagina) { pdf.addPage(); y = 20; }
                pdf.text(linha, 14, y);
                y += 5;
            });
        } else {
            const materialTxt = item.material || "Não informado";
            const qtdTxt = item.quantidade || "0";
            pdf.text(`Material: ${materialTxt}  (Qtd: ${qtdTxt})`, 14, y);
            y += 5;
        }
        
        // Linha separadora discreta
        y += 2;
        pdf.setDrawColor(240, 240, 240);
        pdf.line(14, y, 196, y);
        y += 7; 
    });
    
    pdf.save(`relatorio_${tipoAtual}_${statusFiltro}.pdf`);
}

carregar();
</script>
</body>
</html>
