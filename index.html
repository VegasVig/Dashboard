<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFORMES Vegas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: radial-gradient(circle at top, #1c1c1c, #000);
            color: #e5e5e5;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #111;
            box-shadow: 0 4px 15px black;
        }

        .logo { width: 180px; margin-bottom: 10px; }

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
        }

        input, select, button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
            min-width: 180px;
            box-sizing: border-box;
        }

        button { cursor: pointer; transition: .3s; }
        button:hover { background: #222; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .stat {
            background: #121212;
            border: 1px solid #2a2a2a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .graficoBox {
            max-width: 500px;
            margin: 20px auto;
            background: #121212;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 15px;
        }

        .card {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,.6);
        }

        .nome {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .status {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .em-analise { background: #f97316; color: white; }
        .pendente   { background: #facc15; color: black; }
        .separado   { background: #3b82f6; }
        .entregue   { background: #22c55e; color: black; }

        .assinatura {
            margin-top: 10px;
            background: white;
            border-radius: 10px;
            max-width: 260px;
        }

        .fotoAvaria {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-top: 10px;
            object-fit: cover;
            cursor: pointer;
        }

        .fotosBox {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tipoToggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tipoToggle .ativo {
            background: #c0c0c0;
            color: black;
            font-weight: bold;
        }

        #loadingMsg { text-align: center; padding: 20px; }

        .rankingItem {
            background: #1b1b1b;
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid #2a2a2a;
        }

        /* ── Botões de mudança de status ── */
        .statusBtns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .statusBtns button {
            min-width: unset;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }

        .statusBtns button:hover { opacity: .8; }
        .statusBtns button:active { transform: scale(.96); }

        .btn-analise  { background: #f97316; color: white; }
        .btn-pendente { background: #facc15; color: black; }
        .btn-separado { background: #3b82f6; color: white; }
        .btn-entregue { background: #22c55e; color: black; }

        .btn-atualizando {
            opacity: .5;
            pointer-events: none;
        }

        /* ── Modal de foto ampliada ── */
        #modalFoto {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #modalFoto.aberto { display: flex; }

        #modalFoto img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 0 40px black;
        }

        #modalFoto span {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 36px;
            cursor: pointer;
            color: white;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
            z-index: 9999;
        }

        #toast.visivel { opacity: 1; }
    </style>
</head>

<body>

<header>
    <img src="assets/vegaslogo.jpg" class="logo">
    <h2>UNIFORMES E MATERIAIS VEGAS VIGILÂNCIA</h2>
</header>

<!-- Modal de foto ampliada -->
<div id="modalFoto" onclick="fecharModal()">
    <span onclick="fecharModal()">✕</span>
    <img id="modalImg" src="" alt="Foto ampliada">
</div>

<!-- Toast de feedback -->
<div id="toast"></div>

<div class="tipoToggle">
    <button id="btnUniformes" class="ativo" onclick="trocarTipo('uniformes')">Uniformes</button>
    <button id="btnMateriais" onclick="trocarTipo('materiais')">Materiais</button>
</div>

<div class="filtros">
    <input type="text" id="buscaNome"      placeholder="Buscar Nome"      oninput="renderizar()">
    <input type="text" id="buscaCPF"       placeholder="Buscar CPF"       oninput="renderizar()">
    <input type="text" id="buscaProtocolo" placeholder="Buscar Protocolo" oninput="renderizar()">
    <select id="filtroStatus" onchange="renderizar()">
        <option value="">Todos Status</option>
        <option value="EM ANÁLISE">EM ANÁLISE</option>
        <option value="PENDENTE">PENDENTE</option>
        <option value="SEPARADO">SEPARADO</option>
        <option value="ENTREGUE">ENTREGUE</option>
    </select>
</div>

<div class="stats">
    <div class="stat" id="total">Total: 0</div>
    <div class="stat" id="analise"   style="color:#f97316">Em análise: 0</div>
    <div class="stat" id="pendentes" style="color:#facc15">Pendentes: 0</div>
    <div class="stat" id="separados" style="color:#3b82f6">Separados: 0</div>
    <div class="stat" id="entregues" style="color:#22c55e">Entregues: 0</div>
</div>

<div class="tipoToggle">
    <button onclick="exportarPDF('EM ANÁLISE')">PDF EM ANÁLISE</button>
    <button onclick="exportarPDF('PENDENTE')">PDF PENDENTES</button>
    <button onclick="exportarPDF('SEPARADO')">PDF SEPARADOS</button>
    <button onclick="exportarPDF('ENTREGUE')">PDF ENTREGUES</button>
</div>

<div class="graficoBox">
    <canvas id="graficoStatus"></canvas>
</div>

<div class="graficoBox">
    <h3>Funcionários que mais solicitaram</h3>
    <div id="rankingFuncionarios"></div>
</div>

<div id="loadingMsg">Carregando dados...</div>
<div class="container" id="lista"></div>

<script>

let dadosGlobais = [];
let tipoAtual    = "uniformes";
let grafico;

const URL_SCRIPT =
    "https://script.google.com/macros/s/AKfycbypITHNAwIsz93R-KPnrCG5zQ7oRsu-oxTtk0c5zDZvmuCfyWgxbtoaetaj9MnWpSIJvQ/exec";

/* ═══════════════════════════════════════
   MODAL DE FOTO AMPLIADA
═══════════════════════════════════════ */
function abrirModal(src) {
    document.getElementById("modalImg").src = src;
    document.getElementById("modalFoto").classList.add("aberto");
}

function fecharModal() {
    document.getElementById("modalFoto").classList.remove("aberto");
    document.getElementById("modalImg").src = "";
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function mostrarToast(msg, cor = "#333") {
    const t = document.getElementById("toast");
    t.textContent  = msg;
    t.style.background = cor;
    t.classList.add("visivel");
    setTimeout(() => t.classList.remove("visivel"), 2800);
}

/* ═══════════════════════════════════════
   TROCAR TIPO
═══════════════════════════════════════ */
function trocarTipo(tipo) {
    tipoAtual = tipo;
    document.getElementById("btnUniformes").classList.remove("ativo");
    document.getElementById("btnMateriais").classList.remove("ativo");
    document.getElementById(tipo === "uniformes" ? "btnUniformes" : "btnMateriais")
            .classList.add("ativo");
    carregar();
}

/* ═══════════════════════════════════════
   CARREGAR DADOS
═══════════════════════════════════════ */
async function carregar() {
    document.getElementById("loadingMsg").style.display = "block";

    try {
        const res = await fetch(`${URL_SCRIPT}?tipo=${tipoAtual}`);
        dadosGlobais = await res.json();

        // Normaliza o campo fotos
        dadosGlobais = dadosGlobais.map(item => {

            // fotos (array de base64 – uniformes)
            if (item.fotos && typeof item.fotos === "string") {
                try { item.fotos = JSON.parse(item.fotos); }
                catch { item.fotos = []; }
            }
            if (!Array.isArray(item.fotos)) item.fotos = [];

            // foto singular (materiais) – já vem como string base64, ok.

            return item;
        });

    } catch (e) {
        mostrarToast("Erro ao carregar dados!", "#ef4444");
    }

    document.getElementById("loadingMsg").style.display = "none";
    renderizar();
}

/* ═══════════════════════════════════════
   RENDERIZAR CARDS
═══════════════════════════════════════ */
function renderizar() {

    const busca      = document.getElementById("buscaNome").value.toLowerCase();
    const buscaCPF   = document.getElementById("buscaCPF").value.toLowerCase();
    const buscaProt  = document.getElementById("buscaProtocolo").value.toLowerCase();
    const filtroSts  = document.getElementById("filtroStatus").value;

    const container  = document.getElementById("lista");
    container.innerHTML = "";

    let total = 0, analise = 0, pend = 0, sep = 0, ent = 0;

    // Filtra e exibe na ordem inversa (mais recentes primeiro)
    dadosGlobais.slice().reverse().forEach((item, idx) => {

        // ── Filtros de busca ──
        if (busca    && !(item.nome      || "").toLowerCase().includes(busca))    return;
        if (buscaCPF && !(item.cpf       || "").toLowerCase().includes(buscaCPF)) return;
        if (buscaProt&& !(item.protocolo || "").toLowerCase().includes(buscaProt))return;
        if (filtroSts && item.status !== filtroSts) return;

        total++;
        if (item.status === "EM ANÁLISE") analise++;
        if (item.status === "PENDENTE")   pend++;
        if (item.status === "SEPARADO")   sep++;
        if (item.status === "ENTREGUE")   ent++;

        // índice real no array original (para atualizar depois)
        const idxReal = dadosGlobais.length - 1 - idx;

        const statusClass = item.status.toLowerCase().replace(" ", "-").replace("á","a").replace("é","e");

        // ── Bloco de fotos ──
        const fotosHtml = (() => {
            if (tipoAtual === "materiais") {
                if (!item.foto) return "";
                return `<div class="fotosBox">
                    <img src="${item.foto}" class="fotoAvaria"
                         onclick="abrirModal('${item.foto.replace(/'/g,"\\'")}')">
                </div>`;
            } else {
                if (!item.fotos || item.fotos.length === 0) return "";
                return `<div class="fotosBox">
                    ${item.fotos.map(f => `
                        <img src="${f}" class="fotoAvaria"
                             onclick="abrirModal('${f.replace(/'/g,"\\'")}')">
                    `).join("")}
                </div>`;
            }
        })();

        // ── Botões de status ──
        const statusBtns = `
        <div class="statusBtns">
            <span style="align-self:center;font-size:13px;margin-right:4px;">Alterar:</span>
            <button class="btn-analise"  onclick="alterarStatus(${idxReal}, 'EM ANÁLISE', this)">EM ANÁLISE</button>
            <button class="btn-pendente" onclick="alterarStatus(${idxReal}, 'PENDENTE',   this)">PENDENTE</button>
            <button class="btn-separado" onclick="alterarStatus(${idxReal}, 'SEPARADO',   this)">SEPARADO</button>
            <button class="btn-entregue" onclick="alterarStatus(${idxReal}, 'ENTREGUE',   this)">ENTREGUE</button>
        </div>`;

        // ── Card de MATERIAIS ──
        if (tipoAtual === "materiais") {
            container.innerHTML += `
            <div class="card" id="card-${idxReal}">
                <div class="nome">${item.nome || ""}</div>
                <p><b>Protocolo:</b> ${item.protocolo || ""}</p>
                <p><b>Posto:</b>     ${item.posto     || ""}</p>
                <p><b>Material:</b>  ${item.material  || ""}</p>
                <p><b>Quantidade:</b>${item.quantidade|| ""}</p>
                <p><b>Obs:</b>       ${item.obs       || ""}</p>
                ${item.assinatura ? `<img src="${item.assinatura}" class="assinatura">` : ""}
                ${fotosHtml}
                <p><b>Status:</b> <span class="status ${statusClass}">${item.status}</span></p>
                ${statusBtns}
            </div>`;

        // ── Card de UNIFORMES ──
        } else {
            container.innerHTML += `
            <div class="card" id="card-${idxReal}">
                <div class="nome">${item.nome || ""}</div>
                <p><b>Protocolo:</b> ${item.protocolo || ""}</p>
                <p><b>CPF:</b>       ${item.cpf       || ""}</p>
                <p><b>Telefone:</b>  ${item.telefone  || ""}</p>
                <p><b>Posto:</b>     ${item.posto     || ""}</p>
                <p><b>Uniformes:</b><br>${item.uniformes || ""}</p>
                ${item.assinatura ? `<img src="${item.assinatura}" class="assinatura">` : ""}
                ${fotosHtml}
                <p><b>Status:</b> <span class="status ${statusClass}">${item.status}</span></p>
                ${statusBtns}
            </div>`;
        }
    });

    document.getElementById("total").innerText     = "Total: "      + total;
    document.getElementById("analise").innerText   = "Em análise: " + analise;
    document.getElementById("pendentes").innerText = "Pendentes: "  + pend;
    document.getElementById("separados").innerText = "Separados: "  + sep;
    document.getElementById("entregues").innerText = "Entregues: "  + ent;

    atualizarGrafico(analise, pend, sep, ent);
    atualizarRanking();
}

/* ═══════════════════════════════════════
   ALTERAR STATUS  ←  NOVO
═══════════════════════════════════════ */
async function alterarStatus(idxReal, novoStatus, btnClicado) {

    const item = dadosGlobais[idxReal];
    if (!item) return;

    // Desabilita todos os botões do card durante a requisição
    const card = document.getElementById(`card-${idxReal}`);
    const botoes = card.querySelectorAll(".statusBtns button");
    botoes.forEach(b => b.classList.add("btn-atualizando"));

    mostrarToast("Atualizando...", "#555");

    try {
        const body = {
            tipo:      tipoAtual,
            protocolo: item.protocolo,
            status:    novoStatus
        };

        const res = await fetch(URL_SCRIPT, {
            method: "POST",
            // O Apps Script recebe via e.postData.contents
            body: JSON.stringify(body)
        });

        const json = await res.json();

        if (json.ok) {
            // Atualiza localmente sem recarregar tudo
            item.status = novoStatus;
            mostrarToast(`Status alterado para ${novoStatus}!`, "#22c55e");
            renderizar();
        } else {
            mostrarToast("Erro: " + (json.erro || "falha desconhecida"), "#ef4444");
            botoes.forEach(b => b.classList.remove("btn-atualizando"));
        }

    } catch (e) {
        mostrarToast("Erro de conexão!", "#ef4444");
        botoes.forEach(b => b.classList.remove("btn-atualizando"));
    }
}

/* ═══════════════════════════════════════
   GRÁFICO
═══════════════════════════════════════ */
function atualizarGrafico(analise, pend, sep, ent) {
    const ctx = document.getElementById("graficoStatus");
    if (grafico) grafico.destroy();
    grafico = new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Em análise","Pendentes","Separados","Entregues"],
            datasets: [{
                data: [analise, pend, sep, ent],
                backgroundColor: ["#f97316","#facc15","#3b82f6","#22c55e"]
            }]
        }
    });
}

/* ═══════════════════════════════════════
   RANKING
═══════════════════════════════════════ */
function atualizarRanking() {
    const ranking = {};
    dadosGlobais.forEach(item => {
        if (!item.nome) return;
        ranking[item.nome] = (ranking[item.nome] || 0) + 1;
    });

    const top = Object.entries(ranking)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

    document.getElementById("rankingFuncionarios").innerHTML =
        top.map((r, i) => `
            <div class="rankingItem">
                ${i + 1}. <b>${r[0]}</b><br>${r[1]} solicitações
            </div>
        `).join("");
}

/* ═══════════════════════════════════════
   EXPORTAR PDF
═══════════════════════════════════════ */
async function exportarPDF(statusFiltro) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.setFontSize(18);
    pdf.text(`RELATÓRIO ${statusFiltro}`, 20, 20);
    let y = 35;

    dadosGlobais.filter(i => i.status === statusFiltro).forEach((item, i) => {
        pdf.setFontSize(12);
        pdf.text(`${i + 1}. ${item.nome}`, 20, y);       y += 7;
        pdf.text(`Protocolo: ${item.protocolo || ""}`, 20, y); y += 7;
        pdf.text(`Posto: ${item.posto || ""}`, 20, y);    y += 15;
        if (y > 260) { pdf.addPage(); y = 20; }
    });

    pdf.save(`uniformes_${statusFiltro}.pdf`);
}

/* ── Iniciar ── */
carregar();

</script>
</body>
</html>
