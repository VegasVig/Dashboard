<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFORMES Vegas</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: radial-gradient(circle at top, #1c1c1c, #000);
            color: #e5e5e5;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #111;
            box-shadow: 0 4px 15px black;
        }

        .logo {
            width: 180px;
            margin-bottom: 10px;
        }

        .filtros {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 15px;
        }

        input,
        select,
        button {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
            min-width: 180px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #222;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .stat {
            background: #121212;
            border: 1px solid #2a2a2a;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .graficoBox {
            max-width: 500px;
            margin: 20px auto;
            background: #121212;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 15px;
        }

        .card {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .6);
        }

        .nome {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }

        .status {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .em-analise {
            background: #f97316;
            color: white;
        }

        .pendente {
            background: #facc15;
            color: black;
        }

        .separado {
            background: #3b82f6;
        }

        .entregue {
            background: #22c55e;
            color: black;
        }

        .assinatura {
            margin-top: 10px;
            background: white;
            border-radius: 10px;
            max-width: 260px;
        }

        .fotoAvaria {
            width: 120px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-top: 10px;
        }

        .fotosBox {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tipoToggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tipoToggle .ativo {
            background: #c0c0c0;
            color: black;
            font-weight: bold;
        }

        #loadingMsg {
            text-align: center;
            padding: 20px;
        }

        .rankingItem {
            background: #1b1b1b;
            padding: 10px;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid #2a2a2a;
        }
    </style>
</head>

<body>

    <header>
        <img src="assets/vegaslogo.jpg" class="logo">
        <h2>UNIFORMES E MATERIAIS VEGAS VIGILÂNCIA</h2>
    </header>

    <div class="tipoToggle">
        <button id="btnUniformes" class="ativo"
            onclick="trocarTipo('uniformes')">
            Uniformes
        </button>

        <button id="btnMateriais"
            onclick="trocarTipo('materiais')">
            Materiais
        </button>
    </div>

    <div class="filtros">

        <input type="text"
            id="buscaNome"
            placeholder="Buscar Nome">

        <input type="text"
            id="buscaCPF"
            placeholder="Buscar CPF">

        <input type="text"
            id="buscaProtocolo"
            placeholder="Buscar Protocolo">

        <select id="filtroStatus">
            <option value="">Todos Status</option>
            <option value="EM ANÁLISE">EM ANÁLISE</option>
            <option value="PENDENTE">PENDENTE</option>
            <option value="SEPARADO">SEPARADO</option>
            <option value="ENTREGUE">ENTREGUE</option>
        </select>

    </div>

    <div class="stats">
        <div class="stat" id="total">Total: 0</div>
        <div class="stat" id="analise" style="color:#f97316">Em análise: 0</div>
        <div class="stat" id="pendentes" style="color:#facc15">Pendentes: 0</div>
        <div class="stat" id="separados" style="color:#3b82f6">Separados: 0</div>
        <div class="stat" id="entregues" style="color:#22c55e">Entregues: 0</div>
    </div>

    <!-- BOTÕES PDF -->
    <div class="tipoToggle">

        <button onclick="exportarPDF('EM ANÁLISE')">
            PDF EM ANÁLISE
        </button>

        <button onclick="exportarPDF('PENDENTE')">
            PDF PENDENTES
        </button>

        <button onclick="exportarPDF('SEPARADO')">
            PDF SEPARADOS
        </button>

        <button onclick="exportarPDF('ENTREGUE')">
            PDF ENTREGUES
        </button>

    </div>

    <div class="graficoBox">
        <canvas id="graficoStatus"></canvas>
    </div>

    <div class="graficoBox">
        <h3>Funcionários que mais solicitaram</h3>
        <div id="rankingFuncionarios"></div>
    </div>

    <div id="loadingMsg">Carregando dados...</div>

    <div class="container" id="lista"></div>

    <script>

        let dadosGlobais = [];
        let tipoAtual = "uniformes";
        let grafico;

        // FETCH APP SCRIPT
        const URL_SCRIPT =
            "https://script.google.com/macros/s/AKfycbxeFZGXM28fUn8_2wA_hAAQ9v_N62Rm-RksUlGFbs4ofpYlwKOuA_d_J2awDDDnTZ6f0Q/exec";

        function trocarTipo(tipo) {

            tipoAtual = tipo;

            document.getElementById("btnUniformes")
                .classList.remove("ativo");

            document.getElementById("btnMateriais")
                .classList.remove("ativo");

            if (tipo === "uniformes") {
                document.getElementById("btnUniformes")
                    .classList.add("ativo");
            } else {
                document.getElementById("btnMateriais")
                    .classList.add("ativo");
            }

            carregar();
        }

        async function carregar() {

            document.getElementById("loadingMsg")
                .style.display = "block";

            const res = await fetch(
                `${URL_SCRIPT}?tipo=${tipoAtual}`
            );

            dadosGlobais = await res.json();

            // CORRIGE FOTOS
            dadosGlobais = dadosGlobais.map(item => {

                if (item.fotos && typeof item.fotos === "string") {

                    try {
                        item.fotos = JSON.parse(item.fotos);
                    } catch {
                        item.fotos = [];
                    }
                }

                if (!Array.isArray(item.fotos)) {
                    item.fotos = [];
                }

                return item;
            });

            document.getElementById("loadingMsg")
                .style.display = "none";

            renderizar();
        }

        function renderizar() {

            const container =
                document.getElementById("lista");

            container.innerHTML = "";

            let total = 0;
            let analise = 0;
            let pend = 0;
            let sep = 0;
            let ent = 0;

            dadosGlobais.slice().reverse().forEach(item => {

                total++;

                if (item.status === "EM ANÁLISE") analise++;
                if (item.status === "PENDENTE") pend++;
                if (item.status === "SEPARADO") sep++;
                if (item.status === "ENTREGUE") ent++;

                const statusClass =
                    item.status
                        .toLowerCase()
                        .replace(" ", "-");

                // MATERIAIS
                if (tipoAtual === "materiais") {

                    container.innerHTML += `

                    <div class="card">

                        <div class="nome">
                            ${item.nome || ""}
                        </div>

                        <p><b>Protocolo:</b>
                        ${item.protocolo || ""}</p>

                        <p><b>Posto:</b>
                        ${item.posto || ""}</p>

                        <p><b>Material:</b>
                        ${item.material || ""}</p>

                        <p><b>Quantidade:</b>
                        ${item.quantidade || ""}</p>

                        <p><b>Obs:</b>
                        ${item.obs || ""}</p>

                        ${item.assinatura
                            ? `<img src="${item.assinatura}" class="assinatura">`
                            : ""
                        }

                        ${item.foto
                            ? `
                            <div class="fotosBox">
                                <img src="${item.foto}" class="fotoAvaria">
                            </div>
                            `
                            : ""
                        }

                        <p>
                            <b>Status:</b>

                            <span class="status ${statusClass}">
                                ${item.status}
                            </span>
                        </p>

                    </div>
                    `;

                } else {

                    // UNIFORMES

                    container.innerHTML += `

                    <div class="card">

                        <div class="nome">
                            ${item.nome || ""}
                        </div>

                        <p><b>Protocolo:</b>
                        ${item.protocolo || ""}</p>

                        <p><b>CPF:</b>
                        ${item.cpf || ""}</p>

                        <p><b>Telefone:</b>
                        ${item.telefone || ""}</p>

                        <p><b>Posto:</b>
                        ${item.posto || ""}</p>

                        <p><b>Uniformes:</b><br>
                        ${item.uniformes || ""}</p>

                        ${item.assinatura
                            ? `<img src="${item.assinatura}" class="assinatura">`
                            : ""
                        }

                        ${item.fotos && item.fotos.length > 0
                            ? `
                            <div class="fotosBox">

                                ${item.fotos.map(foto => `
                                    <img src="${foto}" class="fotoAvaria">
                                `).join("")}

                            </div>
                            `
                            : ""
                        }

                        <p>
                            <b>Status:</b>

                            <span class="status ${statusClass}">
                                ${item.status}
                            </span>
                        </p>

                    </div>
                    `;
                }

            });

            document.getElementById("total")
                .innerText = "Total: " + total;

            document.getElementById("analise")
                .innerText = "Em análise: " + analise;

            document.getElementById("pendentes")
                .innerText = "Pendentes: " + pend;

            document.getElementById("separados")
                .innerText = "Separados: " + sep;

            document.getElementById("entregues")
                .innerText = "Entregues: " + ent;

            atualizarGrafico(
                analise,
                pend,
                sep,
                ent
            );

            atualizarRanking();
        }

        function atualizarGrafico(
            analise,
            pend,
            sep,
            ent
        ) {

            const ctx =
                document.getElementById("graficoStatus");

            if (grafico) grafico.destroy();

            grafico = new Chart(ctx, {

                type: "pie",

                data: {

                    labels: [
                        "Em análise",
                        "Pendentes",
                        "Separados",
                        "Entregues"
                    ],

                    datasets: [{
                        data: [
                            analise,
                            pend,
                            sep,
                            ent
                        ],

                        backgroundColor: [
                            "#f97316",
                            "#facc15",
                            "#3b82f6",
                            "#22c55e"
                        ]
                    }]
                }
            });
        }

        function atualizarRanking() {

            const ranking = {};

            dadosGlobais.forEach(item => {

                if (!item.nome) return;

                ranking[item.nome] =
                    (ranking[item.nome] || 0) + 1;
            });

            const top =
                Object.entries(ranking)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10);

            document.getElementById(
                "rankingFuncionarios"
            ).innerHTML = top.map((r, i) => `

                <div class="rankingItem">

                    ${i + 1}.
                    <b>${r[0]}</b>

                    <br>

                    ${r[1]} solicitações

                </div>

            `).join("");
        }

        async function exportarPDF(statusFiltro) {

            const { jsPDF } = window.jspdf;

            const pdf = new jsPDF();

            pdf.setFontSize(18);

            pdf.text(
                `RELATÓRIO ${statusFiltro}`,
                20,
                20
            );

            let y = 35;

            const itens =
                dadosGlobais.filter(
                    item => item.status === statusFiltro
                );

            itens.forEach((item, i) => {

                pdf.setFontSize(12);

                pdf.text(
                    `${i + 1}. ${item.nome}`,
                    20,
                    y
                );

                y += 7;

                pdf.text(
                    `Protocolo: ${item.protocolo || ""}`,
                    20,
                    y
                );

                y += 7;

                pdf.text(
                    `Posto: ${item.posto || ""}`,
                    20,
                    y
                );

                y += 15;

                if (y > 260) {
                    pdf.addPage();
                    y = 20;
                }

            });

            pdf.save(
                `uniformes_${statusFiltro}.pdf`
            );
        }

        carregar();

    </script>

</body>

</html>
